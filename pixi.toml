[workspace]
channels = ["conda-forge"]
name = "bigconv"
version = "0.1.0"
description = "Development environment for bigconv distributed model building blocks"
license = "MIT"
platforms = ["linux-aarch64", "linux-64", "osx-arm64"]
readme = "README.md"
preview = [ "pixi-build" ]

[package]
name = "bigconv"
version = "0.1.0"

[package.build] 
backend = { name = "pixi-build-python", version = "0.*" }

[package.host-dependencies] 
hatchling = "*"

[dependencies]
# Keep the interpreter constraint aligned with pyproject.toml's requires-python.
python = ">=3.10"
numpy = "*"
bigconv = { path = "." }

# PyTorch is intentionally selected by feature so CPU and GPU environments can
# use the appropriate conda-forge builds without leaking PyPI torch semantics
# into package metadata.
[feature.gpu.system-requirements]
cuda = "13"

[feature.gpu.target.linux-aarch64.dependencies]
pytorch-gpu = ">=2.10,<3"
cuda-toolkit = ">=13.0"
triton = ">=3.6.0,<4"

[feature.gpu.target.linux-64.dependencies]
pytorch-gpu = ">=2.10,<3"
cuda-toolkit = ">=13.0"
triton = ">=3.6.0,<4"

[feature.gpu.pypi-dependencies]
helion = ">=0.3.2, <0.4"
packaging = ">=26.0, <27"

[feature.cpu.dependencies]
pytorch-cpu = ">=2.10,<3"

[feature.dev.dependencies]
pytest = "*"
ruff = "*"

[feature.dev.pypi-dependencies]
pyrefly = "*"

[environments]
default = ["gpu"]
cpu = ["cpu"]
dev = ["gpu", "dev"]
dev-cpu = ["cpu", "dev"]
